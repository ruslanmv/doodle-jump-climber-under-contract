name: contract + deploy
on: { push: { branches: ["main","master"] }, workflow_dispatch: {} }
permissions: { contents: read, pages: write, id-token: write }
concurrency: { group: pages, cancel-in-progress: true }
jobs:
  contract-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install agent-generator
      - name: Validate against the Matrix contract
        run: |
          set -e
          mb check frontend/index.html | tee /tmp/v.txt
          grep -q "MATRIX_STATUS: approved" /tmp/v.txt || { echo "::error::contract not satisfied"; exit 1; }
  deploy:
    needs: contract-gate
    runs-on: ubuntu-latest
    environment: { name: github-pages, url: "${{ steps.d.outputs.page_url }}" }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with: { path: ./frontend }
      - id: d
        uses: actions/deploy-pages@v4
